---
# playbooks/add-user.yml
# Add a user to a customer's LLDAP directory (syncs to PocketID via LDAP).
# Optionally updates Tinyauth whitelist if enabled.
# Usage: ansible-playbook playbooks/add-user.yml -i inventories/kunde-abc/ \
#        -e "username=m.mueller email=m.mueller@firma-abc.de display_name='Max Mueller'"

- name: "Add User"
  hosts: all:!localhost:!*proxmox*
  become: true

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - username is defined and username | length > 0
          - email is defined and email | length > 0
          - display_name is defined and display_name | length > 0
        fail_msg: "Required: -e 'username=... email=... display_name=...'"

  tasks:
    # --- LLDAP: Create user in user directory ---
    - name: Authenticate with LLDAP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lldap_web_port | default(17170) }}/auth/simple/login"
        method: POST
        body_format: json
        body:
          username: "admin"
          password: "{{ lldap_admin_password }}"
        status_code: 200
      register: _lldap_auth
      when: "'customer_master' in server_roles"
      no_log: true

    - name: Create user in LLDAP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lldap_web_port | default(17170) }}/api/graphql"
        method: POST
        headers:
          Authorization: "Bearer {{ _lldap_auth.json.token }}"
        body_format: json
        body:
          query: >-
            mutation {
              createUser(user: {
                id: "{{ username }}"
                email: "{{ email }}"
                displayName: "{{ display_name }}"
              }) { id }
            }
        status_code: 200
      register: _lldap_create
      when: "'customer_master' in server_roles"
      failed_when: >-
        _lldap_create.status != 200 and
        'already exists' not in (_lldap_create.json.errors | default([]) | map(attribute='message') | join(' '))

    - name: Add user to 'users' group in LLDAP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lldap_web_port | default(17170) }}/api/graphql"
        method: POST
        headers:
          Authorization: "Bearer {{ _lldap_auth.json.token }}"
        body_format: json
        body:
          query: >-
            mutation {
              addUserToGroup(userId: "{{ username }}", groupId: {{ lldap_users_group_id | default(2) }}) {
                ok
              }
            }
        status_code: 200
      when: "'customer_master' in server_roles"
      failed_when: false

    # --- Tinyauth: Update whitelist (only if enabled) ---
    - name: Update Tinyauth whitelist
      when:
        - "'customer_master' in server_roles"
        - loco.tinyauth.enabled | default(false)
      block:
        - name: Read current Tinyauth .env
          ansible.builtin.slurp:
            src: "/opt/stacks/tinyauth/.env"
          register: tinyauth_env_raw

        - name: Parse current whitelist
          ansible.builtin.set_fact:
            current_whitelist: "{{ (tinyauth_env_raw.content | b64decode).split('\n') | select('match', '^OAUTH_WHITELIST=') | first | regex_replace('^OAUTH_WHITELIST=', '') }}"

        - name: Add email to whitelist
          ansible.builtin.set_fact:
            updated_whitelist: "{{ current_whitelist + ',' + email }}"
          when: email not in current_whitelist

        - name: Update Tinyauth .env with new whitelist
          ansible.builtin.lineinfile:
            path: "/opt/stacks/tinyauth/.env"
            regexp: "^OAUTH_WHITELIST="
            line: "OAUTH_WHITELIST={{ updated_whitelist }}"
          when: updated_whitelist is defined
          notify: restart tinyauth

    - name: User added
      ansible.builtin.debug:
        msg: |
          User {{ username }} ({{ email }}) added to LLDAP.
          PocketID will pick up the user via LDAP sync (max 1h).
          {% if loco.tinyauth.enabled | default(false) %}
          Tinyauth whitelist updated.
          {% endif %}

  handlers:
    - name: restart tinyauth
      ansible.builtin.command: docker restart tinyauth
      changed_when: true

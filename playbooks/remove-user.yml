---
# playbooks/remove-user.yml
# Remove/deactivate a user from LLDAP (propagates to PocketID via LDAP sync).
# Also removes from Tinyauth whitelist if enabled.
# Usage: ansible-playbook playbooks/remove-user.yml -i inventories/kunde-abc/ \
#        -e "username=m.mueller email=m.mueller@firma-abc.de"

- name: "Remove User"
  hosts: all:!localhost:!*proxmox*
  become: true

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - email is defined and email | length > 0
        fail_msg: "Required: -e 'email=...' (optional: username=...)"

  tasks:
    # --- Tinyauth: Remove from whitelist first (immediate session revocation) ---
    - name: Update Tinyauth whitelist
      when:
        - "'customer_master' in server_roles"
        - loco.tinyauth.enabled | default(false)
      block:
        - name: Read current Tinyauth .env
          ansible.builtin.slurp:
            src: "/opt/stacks/tinyauth/.env"
          register: tinyauth_env_raw

        - name: Parse current whitelist
          ansible.builtin.set_fact:
            current_whitelist: "{{ (tinyauth_env_raw.content | b64decode).split('\n') | select('match', '^OAUTH_WHITELIST=') | first | regex_replace('^OAUTH_WHITELIST=', '') }}"

        - name: Remove email from whitelist
          ansible.builtin.set_fact:
            updated_whitelist: "{{ current_whitelist.split(',') | reject('equalto', email) | join(',') }}"

        - name: Update Tinyauth .env without user
          ansible.builtin.lineinfile:
            path: "/opt/stacks/tinyauth/.env"
            regexp: "^OAUTH_WHITELIST="
            line: "OAUTH_WHITELIST={{ updated_whitelist }}"
          when: updated_whitelist is defined
          notify: restart tinyauth

    # --- LLDAP: Delete user from directory ---
    - name: Authenticate with LLDAP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lldap_web_port | default(17170) }}/auth/simple/login"
        method: POST
        body_format: json
        body:
          username: "admin"
          password: "{{ lldap_admin_password }}"
        status_code: 200
      register: _lldap_auth
      when: "'customer_master' in server_roles"
      no_log: true

    - name: Find user in LLDAP by email
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lldap_web_port | default(17170) }}/api/graphql"
        method: POST
        headers:
          Authorization: "Bearer {{ _lldap_auth.json.token }}"
        body_format: json
        body:
          query: >-
            {
              users(filters: { eq: { field: "email", value: "{{ email }}" } }) {
                id
                email
              }
            }
        status_code: 200
      register: _lldap_users
      when: "'customer_master' in server_roles"

    - name: Extract LLDAP user ID
      ansible.builtin.set_fact:
        _lldap_user_id: "{{ (_lldap_users.json.data.users | default([])) | map(attribute='id') | first | default('') }}"
      when: "'customer_master' in server_roles"

    - name: Delete user from LLDAP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lldap_web_port | default(17170) }}/api/graphql"
        method: POST
        headers:
          Authorization: "Bearer {{ _lldap_auth.json.token }}"
        body_format: json
        body:
          query: >-
            mutation { deleteUser(userId: "{{ _lldap_user_id }}") { ok } }
        status_code: 200
      when:
        - "'customer_master' in server_roles"
        - _lldap_user_id | default('') | length > 0

    - name: User removed
      ansible.builtin.debug:
        msg: |
          User {{ email }} removed from LLDAP.
          PocketID will reflect the change on next LDAP sync (max 1h).
          Apps with native LDAP (Nextcloud, Pingvin Share) will deny login immediately.
          {% if loco.tinyauth.enabled | default(false) %}
          Tinyauth whitelist updated — forward-auth session revoked immediately.
          {% endif %}
          For non-LDAP apps, run: ansible-playbook playbooks/disable-user.yml -e "user_email={{ email }}"

  handlers:
    - name: restart tinyauth
      ansible.builtin.command: docker restart tinyauth
      changed_when: true

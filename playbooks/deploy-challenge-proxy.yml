---
# playbooks/deploy-challenge-proxy.yml
# Deploy a minimal ACME challenge proxy on a public-facing server.
#
# This proxy forwards only /.well-known/acme-challenge/* to the Master
# via Netbird, allowing the Master to obtain Let's Encrypt certificates
# without being publicly accessible.
#
# Usage:
#   ansible-playbook playbooks/deploy-challenge-proxy.yml -i <PROXY-HOST>,
#     -e master_netbird_ip=100.x.x.x
#
# Prerequisites:
#   - Public server with Docker installed
#   - Netbird connected to the same network as Master
#   - Public DNS: *.admin.example.com -> this server's public IP

- name: Deploy ACME Challenge Proxy
  hosts: all
  become: true
  vars:
    proxy_stack_path: "/opt/stacks/challenge-proxy"
    master_netbird_ip: "{{ master_netbird_ip | default('') }}"

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

    - name: Validate master_netbird_ip
      ansible.builtin.fail:
        msg: "master_netbird_ip muss gesetzt sein (-e master_netbird_ip=100.x.x.x)"
      when: master_netbird_ip | length == 0

  tasks:
    - name: Create proxy stack directory
      ansible.builtin.file:
        path: "{{ proxy_stack_path }}"
        state: directory
        mode: "0755"

    - name: Deploy challenge proxy Caddyfile
      ansible.builtin.copy:
        content: |
          # ACME Challenge Proxy for LocoCloud Master
          # Forwards Let's Encrypt HTTP-01 challenges to Master via Netbird
          :80 {
              handle /.well-known/acme-challenge/* {
                  reverse_proxy http://{{ master_netbird_ip }}:80 {
                      header_up Host {host}
                  }
              }
              handle {
                  respond 404
              }
          }
        dest: "{{ proxy_stack_path }}/Caddyfile"
        mode: "0644"
      notify: restart challenge proxy

    - name: Deploy challenge proxy docker-compose.yml
      ansible.builtin.copy:
        content: |
          services:
            caddy:
              image: caddy:2
              container_name: challenge-proxy
              restart: unless-stopped
              ports:
                - "80:80"
              volumes:
                - ./Caddyfile:/etc/caddy/Caddyfile:ro
        dest: "{{ proxy_stack_path }}/docker-compose.yml"
        mode: "0644"

    - name: Start challenge proxy
      community.docker.docker_compose_v2:
        project_src: "{{ proxy_stack_path }}"
        state: present

  handlers:
    - name: restart challenge proxy
      ansible.builtin.command: docker restart challenge-proxy
      failed_when: false

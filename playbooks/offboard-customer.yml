---
# playbooks/offboard-customer.yml
# Offboard a customer — staged process: archive, then optionally destroy.
# Usage: ansible-playbook playbooks/offboard-customer.yml -i inventories/kunde-abc/ \
#        [-e "destroy=true"]
#
# Default (destroy=false): Final backup, stop all services, cleanup API resources, archive data.
# With destroy=true: Also removes Netbird peers/groups and Proxmox LXCs.
#
# Play 1: Final backup on customer servers
# Play 2: Stop all Docker stacks + Alloy agent
# Play 3: API cleanup (OIDC clients, Vaultwarden archive)
# Play 4: Netbird peer/group removal (only destroy=true)
# Play 5: LXC destruction on Proxmox (only destroy=true)

# =====================================================
# Play 1: Final backup
# =====================================================
- name: "Offboarding — Final Backup"
  hosts: all:!localhost:!*proxmox*
  become: true

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

  tasks:
    - name: Run final backup
      ansible.builtin.command: "{{ backup_script_path | default('/opt/scripts/backup') }}/backup.sh"
      register: final_backup
      changed_when: true
      when: backup.enabled | default(false)
      ignore_errors: true

    - name: Verify backup
      ansible.builtin.command: >
        restic -r {{ (backup.targets | first).type }}:{{ (backup.targets | first).user }}@{{ (backup.targets | first).host }}:{{ (backup.targets | first).port | default(22) }}{{ (backup.targets | first).path }}
        check
        --password-file /opt/scripts/backup/.restic-password
      changed_when: false
      when: backup.enabled | default(false)
      ignore_errors: true

# =====================================================
# Play 2: Stop all services
# =====================================================
- name: "Offboarding — Stop Services"
  hosts: all:!localhost:!*proxmox*
  become: true

  tasks:
    - name: Stop all Docker stacks
      community.docker.docker_compose_v2:
        project_src: "{{ item }}"
        state: absent
      loop: "{{ lookup('fileglob', '/opt/stacks/*/docker-compose.yml', wantlist=True) | map('dirname') | list }}"
      ignore_errors: true

    - name: Stop Alloy monitoring agent
      community.docker.docker_compose_v2:
        project_src: "/opt/stacks/alloy"
        state: absent
      ignore_errors: true

    - name: Disable backup cron
      ansible.builtin.cron:
        name: "lococloudd-backup"
        state: absent

    - name: Services stopped
      ansible.builtin.debug:
        msg: "All services stopped on {{ inventory_hostname }}. Data is preserved."

# =====================================================
# Play 3: API Cleanup (PocketID OIDC clients, Vaultwarden archive)
# =====================================================
- name: "Offboarding — API Cleanup"
  hosts: localhost
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

    - name: Load customer config
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all.yml"

  tasks:
    # --- Remove OIDC clients from PocketID ---
    - name: List OIDC clients in PocketID
      ansible.builtin.uri:
        url: "https://id.{{ kunde_domain }}/api/oidc/clients"
        method: GET
        headers:
          X-API-Key: "{{ loco.pocketid.api_token }}"
        status_code: [200, 404, 502]
      register: _oidc_clients
      failed_when: false
      when: loco.pocketid.api_token | default('') | length > 0

    - name: Remove OIDC clients for customer
      ansible.builtin.uri:
        url: "https://id.{{ kunde_domain }}/api/oidc/clients/{{ item.id }}"
        method: DELETE
        headers:
          X-API-Key: "{{ loco.pocketid.api_token }}"
        status_code: [200, 204, 404]
      loop: "{{ _oidc_clients.json | default([]) }}"
      loop_control:
        label: "{{ item.name | default(item.id) }}"
      when:
        - _oidc_clients.status | default(0) == 200
        - _oidc_clients.json is defined
      failed_when: false

    # --- Archive Vaultwarden credentials folder ---
    - name: Archive customer credentials in Vaultwarden
      ansible.builtin.include_role:
        name: credentials
        tasks_from: archive_folder.yml
      vars:
        vw_api_url: "{{ loco.vaultwarden.url }}"
        credential_folder_name: "{{ kunde_name }} ({{ kunde_domain }})"
        archive_prefix: "[ARCHIV]"
      when: loco.vaultwarden.url | default('') | length > 0
      failed_when: false

    - name: API cleanup complete
      ansible.builtin.debug:
        msg: >
          API cleanup for {{ kunde_name }}:
          OIDC clients removed, Vaultwarden folder archived.

# =====================================================
# Play 4: Remove Netbird peers (API)
# =====================================================
- name: "Offboarding — Netbird Cleanup"
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

  tasks:
    - name: Skip Netbird cleanup if not destroying or Netbird disabled
      ansible.builtin.meta: end_play
      when: not (destroy | default(false) | bool) or not (loco.netbird.enabled | default(false))

    # List peers in customer group
    - name: List Netbird peers
      ansible.builtin.uri:
        url: "{{ loco.netbird.manager_url }}/api/peers"
        method: GET
        headers:
          Authorization: "Token {{ loco.netbird.api_token }}"
        status_code: 200
      register: nb_peers

    - name: Find customer peers
      ansible.builtin.set_fact:
        customer_peers: "{{ nb_peers.json | selectattr('name', 'match', kunde_id ~ '-.*') | list }}"

    - name: Remove customer peers from Netbird
      ansible.builtin.uri:
        url: "{{ loco.netbird.manager_url }}/api/peers/{{ item.id }}"
        method: DELETE
        headers:
          Authorization: "Token {{ loco.netbird.api_token }}"
        status_code: [200, 204, 404]
      loop: "{{ customer_peers }}"
      loop_control:
        label: "{{ item.name }}"

    # Remove customer group
    - name: List groups
      ansible.builtin.uri:
        url: "{{ loco.netbird.manager_url }}/api/groups"
        method: GET
        headers:
          Authorization: "Token {{ loco.netbird.api_token }}"
        status_code: 200
      register: nb_groups

    - name: Find customer group
      ansible.builtin.set_fact:
        customer_group: "{{ nb_groups.json | selectattr('name', 'equalto', 'kunde-' ~ kunde_id) | list | first | default(None) }}"

    - name: Remove customer group
      ansible.builtin.uri:
        url: "{{ loco.netbird.manager_url }}/api/groups/{{ customer_group.id }}"
        method: DELETE
        headers:
          Authorization: "Token {{ loco.netbird.api_token }}"
        status_code: [200, 204, 404]
      when: customer_group != None

    - name: Netbird cleanup complete
      ansible.builtin.debug:
        msg: "Removed {{ customer_peers | length }} Netbird peers and customer group for {{ kunde_id }}."

# =====================================================
# Play 5: Destroy LXCs on Proxmox (optional)
# =====================================================
- name: "Offboarding — Destroy LXCs"
  hosts: "*proxmox*"
  become: true
  gather_facts: false

  pre_tasks:
    - name: Load global config
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/lococloudd.yml"
        name: loco
      tags: [always]

  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy | default(false) | bool)

    - name: Destroy customer LXCs
      community.general.proxmox:
        vmid: "{{ item.lxc_vmid }}"
        node: "{{ proxmox_node }}"
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        state: absent
        force: true
      loop: "{{ apps_enabled | selectattr('lxc_vmid', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }} (VMID {{ item.lxc_vmid }})"
      ignore_errors: true

    - name: LXCs destroyed
      ansible.builtin.debug:
        msg: "Customer LXCs destroyed on Proxmox. Offboarding complete."

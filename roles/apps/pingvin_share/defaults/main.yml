---
# roles/apps/pingvin_share/defaults/main.yml
# Pingvin Share — Self-hosted file sharing

pingvin_share_stack_path: "/opt/stacks/pingvin-share"
pingvin_share_data_path: "/mnt/data/pingvin-share"
pingvin_share_image: "stonith404/pingvin-share:1"
pingvin_share_port: 8087

pingvin_share_domain: ""

# LDAP via lldap (native support since v1.0.0)
pingvin_share_ldap_enabled: false
pingvin_share_ldap_url: "ldap://127.0.0.1:3890"
pingvin_share_ldap_bind_dn: ""        # e.g. "uid=readonly,ou=people,dc=firma,dc=at"
pingvin_share_ldap_bind_password: ""
pingvin_share_ldap_search_base: ""    # e.g. "ou=people,dc=firma,dc=at"
pingvin_share_ldap_admin_group: "admins"

# OIDC
pingvin_share_oidc_enabled: false
pingvin_share_oidc_client_id: ""
pingvin_share_oidc_client_secret: ""
pingvin_share_oidc_provider_url: ""

# Caddy defense-in-depth: block signup path
pingvin_share_blocked_paths:
  - "/auth/signUp*"

pingvin_share_public_paths: []

pingvin_share_backup_paths:
  - "/opt/stacks/pingvin-share"
  - "/mnt/data/pingvin-share"

pingvin_share_health_path: "/"

---
# roles/apps/invoiceninja/tasks/deploy.yml

- name: Generate Invoice Ninja DB password if empty
  ansible.builtin.set_fact:
    invoiceninja_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: invoiceninja_db_password | length == 0

- name: Generate Invoice Ninja DB root password if empty
  ansible.builtin.set_fact:
    invoiceninja_db_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: invoiceninja_db_root_password | length == 0

- name: Create Invoice Ninja directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ invoiceninja_stack_path }}"
    - "{{ invoiceninja_data_path }}"
    - "{{ invoiceninja_data_path }}/public"
    - "{{ invoiceninja_data_path }}/storage"
    - "{{ invoiceninja_data_path }}/db"

- name: Deploy Invoice Ninja docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ invoiceninja_stack_path }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Invoice Ninja nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ invoiceninja_stack_path }}/nginx.conf"
    mode: "0644"

- name: Generate APP_KEY if empty
  ansible.builtin.command: >
    docker run --rm {{ invoiceninja_image }}
    php artisan key:generate --show
  register: _in_app_key
  changed_when: false
  when: invoiceninja_app_key | length == 0

- name: Set APP_KEY fact
  ansible.builtin.set_fact:
    invoiceninja_app_key: "{{ _in_app_key.stdout | trim }}"
  when: invoiceninja_app_key | length == 0

- name: Deploy Invoice Ninja .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ invoiceninja_stack_path }}/.env"
    mode: "0600"

- name: Start Invoice Ninja
  community.docker.docker_compose_v2:
    project_src: "{{ invoiceninja_stack_path }}"
    state: present

- name: Wait for MariaDB to be ready
  ansible.builtin.command: >
    docker exec invoiceninja-db
    mariadb-admin ping -h 127.0.0.1 -u root -p{{ invoiceninja_db_root_password }} --silent
  register: _in_db_health
  until: _in_db_health.rc == 0
  retries: 30
  delay: 3
  changed_when: false

- name: Run database migrations
  ansible.builtin.command: >
    docker exec invoiceninja
    php artisan migrate --force --no-interaction
  register: _in_migrate
  changed_when: "'Migrating' in _in_migrate.stdout"

- name: Wait for Invoice Ninja to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ invoiceninja_port }}{{ invoiceninja_health_path }}"
    method: GET
    status_code: [200, 301, 302]
  register: _in_health
  until: _in_health.status in [200, 301, 302]
  retries: 30
  delay: 5

- name: Store Invoice Ninja credentials in Vaultwarden
  ansible.builtin.include_role:
    name: credentials
    tasks_from: store.yml
  vars:
    vw_api_url: "{{ loco.vaultwarden.url }}"
    credential_name: "{{ kunde_name }} — Invoice Ninja DB"
    credential_username: "{{ invoiceninja_db_user }}"
    credential_password: "{{ invoiceninja_db_password }}"
    credential_uri: "https://{{ invoiceninja_domain }}"
    credential_notes: |
      Invoice Ninja MariaDB credentials.
      Root password: {{ invoiceninja_db_root_password }}
      APP_KEY: {{ invoiceninja_app_key }}
      Deployed: {{ ansible_facts.date_time.iso8601 }}
  when:
    - loco is defined
    - loco.vaultwarden is defined

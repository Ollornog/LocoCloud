---
# roles/apps/kimai/defaults/main.yml
# Kimai — Time tracking for teams
# No native OIDC (SAML only) — uses Tinyauth forward-auth + LDAP via lldap

kimai_stack_path: "/opt/stacks/kimai"
kimai_data_path: "/mnt/data/kimai"
kimai_image: "kimai/kimai2:apache"
kimai_port: 8236

# Domain
kimai_domain: ""  # e.g. "time.firma-abc.de"

# Database (MariaDB)
kimai_db_image: "mariadb:11"
kimai_db_name: "kimai"
kimai_db_user: "kimai"
kimai_db_password: ""  # Generated if empty

# Auth: Tinyauth forward-auth (Kimai has no native OIDC)
kimai_tinyauth: true

# LDAP via lldap (user authentication inside Kimai)
kimai_ldap_enabled: false
kimai_ldap_host: ""  # e.g. "lldap" or Netbird IP
kimai_ldap_port: 3890
kimai_ldap_bind_dn: ""  # e.g. "uid=readonly,ou=people,dc=firma,dc=de"
kimai_ldap_bind_password: ""
kimai_ldap_base_dn: ""  # e.g. "ou=people,dc=firma,dc=de"
kimai_ldap_user_filter: "(&(uid={username})(objectClass=person))"

# Caddy
kimai_blocked_paths:
  - "/register*"
kimai_public_paths: []

# Backup
kimai_backup_paths:
  - "/opt/stacks/kimai"
  - "/mnt/data/kimai"

kimai_pre_backup_cmd: >-
  docker exec kimai-db
  mariadb-dump -u root -p{{ kimai_db_password }}
  --all-databases --single-transaction

kimai_health_path: "/"

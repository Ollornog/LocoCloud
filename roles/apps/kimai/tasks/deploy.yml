---
- name: Generate Kimai DB password if empty
  ansible.builtin.set_fact:
    kimai_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: kimai_db_password | length == 0

- name: Create Kimai directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ kimai_stack_path }}"
    - "{{ kimai_data_path }}"
    - "{{ kimai_data_path }}/data"
    - "{{ kimai_data_path }}/db"

- name: Deploy Kimai LDAP config
  ansible.builtin.template:
    src: local.yaml.j2
    dest: "{{ kimai_stack_path }}/local.yaml"
    mode: "0644"
  when: kimai_ldap_enabled

- name: Deploy Kimai docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ kimai_stack_path }}/docker-compose.yml"
    mode: "0644"

- name: Start Kimai
  community.docker.docker_compose_v2:
    project_src: "{{ kimai_stack_path }}"
    state: present

- name: Wait for Kimai to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kimai_port }}{{ kimai_health_path }}"
    method: GET
    status_code: [200, 301, 302]
  register: _kimai_health
  until: _kimai_health.status in [200, 301, 302]
  retries: 30
  delay: 5

- name: Store Kimai credentials in Vaultwarden
  ansible.builtin.include_role:
    name: credentials
    tasks_from: store.yml
  vars:
    vw_api_url: "{{ loco.vaultwarden.url }}"
    credential_name: "{{ kunde_name }} — Kimai"
    credential_username: "{{ kimai_db_user }}"
    credential_password: "{{ kimai_db_password }}"
    credential_uri: "https://{{ kimai_domain }}"
    credential_notes: |
      Kimai DB credentials. Auth via Tinyauth + LDAP (lldap).
      Deployed: {{ ansible_facts.date_time.iso8601 }}
  when:
    - loco is defined
    - loco.vaultwarden is defined

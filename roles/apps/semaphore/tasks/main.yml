---
# roles/apps/semaphore/tasks/main.yml

- name: Deploy Semaphore
  ansible.builtin.import_tasks: deploy.yml
  tags: [semaphore, deploy]

- name: Configure Semaphore SSO via PocketID
  ansible.builtin.include_tasks: oidc.yml
  when: pocketid_api_token | default('') | length > 0
  tags: [semaphore, oidc]

- name: Setup Semaphore project templates
  ansible.builtin.include_tasks: setup-templates.yml
  when: semaphore_admin_password | default('') | length > 0
  tags: [semaphore, templates]

---
- name: Generate Easy!Appointments DB password if empty
  ansible.builtin.set_fact:
    easy_appointments_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: easy_appointments_db_password | length == 0

- name: Generate Easy!Appointments DB root password if empty
  ansible.builtin.set_fact:
    easy_appointments_db_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: easy_appointments_db_root_password | length == 0

- name: Create Easy!Appointments directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ easy_appointments_stack_path }}"
    - "{{ easy_appointments_data_path }}"
    - "{{ easy_appointments_data_path }}/data"
    - "{{ easy_appointments_data_path }}/db"

- name: Deploy Easy!Appointments docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ easy_appointments_stack_path }}/docker-compose.yml"
    mode: "0644"

- name: Start Easy!Appointments
  community.docker.docker_compose_v2:
    project_src: "{{ easy_appointments_stack_path }}"
    state: present

- name: Wait for Easy!Appointments to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ easy_appointments_port }}{{ easy_appointments_health_path }}"
    method: GET
    status_code: [200, 301, 302]
  register: _ea_health
  until: _ea_health.status in [200, 301, 302]
  retries: 30
  delay: 5

- name: Store Easy!Appointments credentials in Vaultwarden
  ansible.builtin.include_role:
    name: credentials
    tasks_from: store.yml
  vars:
    vw_api_url: "{{ loco.vaultwarden.url }}"
    credential_name: "{{ kunde_name }} — Easy!Appointments"
    credential_username: "{{ easy_appointments_db_user }}"
    credential_password: "{{ easy_appointments_db_password }}"
    credential_uri: "https://{{ easy_appointments_domain }}"
    credential_notes: |
      Easy!Appointments DB credentials. Auth via Tinyauth.
      DB Root: {{ easy_appointments_db_root_password }}
      Deployed: {{ ansible_facts.date_time.iso8601 }}
  when:
    - loco is defined
    - loco.vaultwarden is defined

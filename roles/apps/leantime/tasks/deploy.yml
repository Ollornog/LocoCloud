---
- name: Generate Leantime DB password if empty
  ansible.builtin.set_fact:
    leantime_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: leantime_db_password | length == 0

- name: Generate Leantime session password if empty
  ansible.builtin.set_fact:
    leantime_session_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
  when: leantime_session_password | length == 0

- name: Create Leantime directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ leantime_stack_path }}"
    - "{{ leantime_data_path }}"
    - "{{ leantime_data_path }}/db"
    - "{{ leantime_data_path }}/userfiles"
    - "{{ leantime_data_path }}/public-userfiles"
    - "{{ leantime_data_path }}/plugins"

- name: Deploy Leantime docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ leantime_stack_path }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Leantime .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ leantime_stack_path }}/.env"
    mode: "0600"

- name: Start Leantime
  community.docker.docker_compose_v2:
    project_src: "{{ leantime_stack_path }}"
    state: present

- name: Wait for Leantime to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ leantime_port }}{{ leantime_health_path }}"
    method: GET
    status_code: [200, 301, 302]
  register: _leantime_health
  until: _leantime_health.status in [200, 301, 302]
  retries: 30
  delay: 5

- name: Store Leantime credentials in Vaultwarden
  ansible.builtin.include_role:
    name: credentials
    tasks_from: store.yml
  vars:
    vw_api_url: "{{ loco.vaultwarden.url }}"
    credential_name: "{{ kunde_name }} — Leantime"
    credential_username: "{{ leantime_db_user }}"
    credential_password: "{{ leantime_db_password }}"
    credential_uri: "https://{{ leantime_domain }}"
    credential_notes: |
      Leantime DB credentials.
      Session Password: {{ leantime_session_password }}
      Deployed: {{ ansible_facts.date_time.iso8601 }}
  when:
    - loco is defined
    - loco.vaultwarden is defined

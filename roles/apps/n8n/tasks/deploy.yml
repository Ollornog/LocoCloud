---
- name: Generate n8n DB password if empty
  ansible.builtin.set_fact:
    n8n_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: n8n_db_password | length == 0

- name: Generate n8n encryption key if empty
  ansible.builtin.set_fact:
    n8n_encryption_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
  when: n8n_encryption_key | length == 0

- name: Create n8n directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ n8n_stack_path }}"
    - "{{ n8n_data_path }}"
    - "{{ n8n_data_path }}/db"
    - "{{ n8n_data_path }}/data"

- name: Deploy n8n docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_stack_path }}/docker-compose.yml"
    mode: "0644"

- name: Deploy n8n .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ n8n_stack_path }}/.env"
    mode: "0600"

- name: Start n8n
  community.docker.docker_compose_v2:
    project_src: "{{ n8n_stack_path }}"
    state: present

- name: Wait for n8n to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ n8n_port }}{{ n8n_health_path }}"
    method: GET
    status_code: [200, 301, 302]
  register: _n8n_health
  until: _n8n_health.status in [200, 301, 302]
  retries: 30
  delay: 5

- name: Store n8n credentials in Vaultwarden
  ansible.builtin.include_role:
    name: credentials
    tasks_from: store.yml
  vars:
    vw_api_url: "{{ loco.vaultwarden.url }}"
    credential_name: "{{ kunde_name }} — n8n"
    credential_username: "{{ n8n_db_user }}"
    credential_password: "{{ n8n_db_password }}"
    credential_uri: "https://{{ n8n_domain }}"
    credential_notes: |
      n8n DB credentials. Auth via Tinyauth.
      Encryption Key: {{ n8n_encryption_key }}
      WARNING: Loss of encryption key = all stored credentials unrecoverable!
      Deployed: {{ ansible_facts.date_time.iso8601 }}
  when:
    - loco is defined
    - loco.vaultwarden is defined

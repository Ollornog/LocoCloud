---
- name: restart caddy
  ansible.builtin.command: docker restart caddy
  changed_when: true

- name: restart self-healing
  ansible.builtin.systemd:
    name: lococloudd-self-healing.service
    daemon_reload: true

- name: restart self-healing timer
  ansible.builtin.systemd:
    name: lococloudd-self-healing.timer
    state: restarted
    daemon_reload: true

---
# roles/grafana_stack/handlers/main.yml

- name: restart grafana
  ansible.builtin.command: docker restart grafana
  changed_when: true

- name: restart metrics
  ansible.builtin.command: "docker restart {{ 'victoriametrics' if metrics_backend == 'victoriametrics' else 'prometheus' }}"
  changed_when: true

# Backwards-compatible alias
- name: restart prometheus
  ansible.builtin.command: "docker restart {{ 'victoriametrics' if metrics_backend == 'victoriametrics' else 'prometheus' }}"
  changed_when: true

- name: restart loki
  ansible.builtin.command: docker restart loki
  changed_when: true

- name: restart caddy
  ansible.builtin.command: docker restart caddy
  changed_when: true

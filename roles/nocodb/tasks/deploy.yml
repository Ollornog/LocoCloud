---
# roles/nocodb/tasks/deploy.yml

- name: Create NocoDB directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nocodb_stack_path }}"
    - "{{ nocodb_stack_path }}/data"

- name: Generate NocoDB admin password if not set
  ansible.builtin.set_fact:
    nocodb_admin_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: nocodb_admin_password | length == 0

- name: Generate NocoDB JWT secret if not set
  ansible.builtin.set_fact:
    nocodb_jwt_secret: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
  when: nocodb_jwt_secret | length == 0

- name: Deploy NocoDB .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ nocodb_stack_path }}/.env"
    mode: "0600"
  notify: restart nocodb

- name: Deploy NocoDB docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ nocodb_stack_path }}/docker-compose.yml"
    mode: "0644"
  notify: restart nocodb

- name: Start NocoDB
  community.docker.docker_compose_v2:
    project_src: "{{ nocodb_stack_path }}"
    state: present

- name: Wait for NocoDB to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nocodb_port }}{{ nocodb_health_path }}"
    method: GET
    status_code: [200]
  register: nocodb_health
  until: nocodb_health.status == 200
  retries: 30
  delay: 5

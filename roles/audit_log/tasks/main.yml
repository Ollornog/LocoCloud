---
# roles/audit_log/tasks/main.yml
# Sets up centralized audit logging infrastructure.

- name: Create audit log directory
  ansible.builtin.file:
    path: "{{ audit_log_path }}"
    state: directory
    mode: "0750"
    owner: root
    group: root
  tags: [audit_log]

- name: Deploy Docker event logger service
  ansible.builtin.template:
    src: docker-audit.service.j2
    dest: "/etc/systemd/system/{{ audit_log_docker_events_service }}.service"
    mode: "0644"
  notify: restart docker audit
  when: audit_log_docker_events_enabled
  tags: [audit_log]

- name: Deploy Docker event logger script
  ansible.builtin.template:
    src: docker-audit.sh.j2
    dest: "{{ audit_log_path }}/docker-audit.sh"
    mode: "0755"
  notify: restart docker audit
  when: audit_log_docker_events_enabled
  tags: [audit_log]

- name: Enable Docker event logger
  ansible.builtin.systemd:
    name: "{{ audit_log_docker_events_service }}"
    state: started
    enabled: true
    daemon_reload: true
  when: audit_log_docker_events_enabled
  tags: [audit_log]

- name: Deploy logrotate config for audit logs
  ansible.builtin.template:
    src: logrotate-audit.j2
    dest: "/etc/logrotate.d/lococloudd-audit"
    mode: "0644"
  tags: [audit_log]

- name: Deploy admin action log (touch idempotent)
  ansible.builtin.file:
    path: "{{ audit_log_admin_log }}"
    state: touch
    mode: "0640"
    owner: root
    group: root
    modification_time: preserve
    access_time: preserve
  when: audit_log_ansible_enabled
  tags: [audit_log]
